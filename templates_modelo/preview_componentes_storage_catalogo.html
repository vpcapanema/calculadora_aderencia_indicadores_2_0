    <script>
        (function () {
            'use strict';
            if (window.__CSCH2_CABECALHO_STORAGE_CATALOGO__) return;
            window.__CSCH2_CABECALHO_STORAGE_CATALOGO__ = true;

            function initHeader(root) {
                if (!root || root.dataset.csch2Bound === 'true') return;
                root.dataset.csch2Bound = 'true';

                var toggle = root.querySelector('[data-csch2-toggle]');
                var menu = root.querySelector('[data-csch2-menu]');

                if (toggle && menu) {
                    toggle.addEventListener('click', function () {
                        menu.classList.toggle('csch2-navbar__menu--open');
                    });
                }

                root.querySelectorAll('[data-csch2-dropdown-toggle]').forEach(function (btn) {
                    btn.addEventListener('click', function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var item = btn.closest('[data-csch2-dropdown]');
                        var isOpen = item.classList.contains('csch2-navbar__item--open');
                        root.querySelectorAll('[data-csch2-dropdown].csch2-navbar__item--open').forEach(function (el) {
                            el.classList.remove('csch2-navbar__item--open');
                            var t = el.querySelector('[data-csch2-dropdown-toggle]');
                            if (t) t.setAttribute('aria-expanded', 'false');
                        });
                        if (!isOpen) {
                            item.classList.add('csch2-navbar__item--open');
                            btn.setAttribute('aria-expanded', 'true');
                        }
                    });
                });
            }

            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('[data-csch2-root]').forEach(initHeader);
            });

            document.addEventListener('click', function (e) {
                document.querySelectorAll('[data-csch2-root]').forEach(function (root) {
                    if (!root.contains(e.target)) {
                        var menu = root.querySelector('[data-csch2-menu]');
                        if (menu) menu.classList.remove('csch2-navbar__menu--open');
                        root.querySelectorAll('[data-csch2-dropdown].csch2-navbar__item--open').forEach(function (el) {
                            el.classList.remove('csch2-navbar__item--open');
                            var t = el.querySelector('[data-csch2-dropdown-toggle]');
                            if (t) t.setAttribute('aria-expanded', 'false');
                        });
                    }
                });
            });
        }());

        /* ── govsp kebab (inline de script-top-v2.js) ── */
        (function () {
            var topoGlobal = document.querySelector('#topbarGlobal');
            var kebabGov = document.querySelector('.govsp-kebab');
            var dropdownGov = document.querySelector('.govsp-dropdown');
            if (kebabGov) {

                    dropdownGov.classList.toggle('govsp-active');

                        dropdownGov.setAttribute('aria-hidden', 'false');

        /* ── bridge: mede o cabeçalho fixo e aplica padding-top no body ── */
        (function () {
            function measureCabecalho() {
                var wrap = document.querySelector('.sigma-cabecalho-fixo');
                if (!wrap) return;
                var h = wrap.offsetHeight;
                if (!h || h < 24) return;
                document.body.style.paddingTop = h + 'px';
            }
            function q() { window.requestAnimationFrame(measureCabecalho); }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', q); else q();
            window.addEventListener('load', q);
            window.addEventListener('resize', q);
            setTimeout(q, 150); setTimeout(q, 400); setTimeout(q, 900);
            if ('ResizeObserver' in window) {
                var ro = new ResizeObserver(q);
                var wrap = document.querySelector('.sigma-cabecalho-fixo');
                if (wrap) ro.observe(wrap);
            }
